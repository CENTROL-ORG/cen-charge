<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEN Recharge | Custom Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg-base: #0d0e12;
            --bg-surface: #15171e;
            --bg-element: #1c1f27;
            --border-color: #262a35;
            --accent-glow: #00ff88;
            --accent-glow-hover: #00cc6e;
            --text-primary: #f5f6fa;
            --text-secondary: #7f8c8d;
        }

        body { 
            background: var(--bg-base); 
            color: var(--text-primary); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 16px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container { 
            width: 100%; 
            max-width: 420px; 
            display: flex;
            flex-direction: column;
            gap: 16px; 
        }

        .card { 
            background: var(--bg-surface); 
            border: 1px solid var(--border-color); 
            padding: 24px; 
            border-radius: 20px; 
            box-sizing: border-box; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .app-header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1.app-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 4px 0;
            color: var(--text-secondary);
        }

        .app-subtitle {
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
        }

        /* LIVE WALLET MONITOR DISPLAY */
        .wallet-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-element);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .wallet-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .wallet-value {
            font-size: 14px;
            font-weight: 700;
            font-family: 'SFMono-Regular', Consolas, monospace;
        }

        /* INPUT CONFIGURATION BLOCKS */
        .time-config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        .input-group { 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label { 
            font-size: 11px; 
            color: var(--text-secondary); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input { 
            width: 100%; 
            padding: 14px 40px 14px 16px; 
            background: var(--bg-element); 
            border: 1px solid var(--border-color); 
            color: var(--text-primary); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 18px; 
            font-weight: 700;
            font-family: 'SFMono-Regular', Consolas, monospace;
            outline: none; 
            transition: all 0.15s ease;
        }

        input:focus { 
            border-color: var(--accent-glow); 
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.1);
        }

        .input-unit {
            position: absolute;
            right: 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: lowercase;
            pointer-events: none;
        }

        /* TELECOM PLAN COST CARD */
        .price-display { 
            background: rgba(0, 255, 136, 0.03); 
            padding: 16px; 
            border-radius: 14px; 
            margin-bottom: 24px; 
            border: 1px solid rgba(0, 255, 136, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-meta-label {
            font-size: 11px; 
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .price-rate-hint {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        #final-price { 
            font-size: 26px; 
            font-weight: 800; 
            color: var(--accent-glow);
            font-family: 'SFMono-Regular', Consolas, monospace;
            text-shadow: 0 0 12px rgba(0, 255, 136, 0.2);
        }

        /* ACTION TRIGGER SUBMISSION */
        .btn-pay { 
            background: var(--accent-glow); 
            color: #000; 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            font-size: 15px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease; 
            box-shadow: 0 4px 16px rgba(0, 255, 136, 0.2);
        }

        .btn-pay:hover { 
            background: var(--accent-glow-hover); 
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.3);
            transform: translateY(-1px);
        }
        
        .btn-pay:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            
            <div class="app-header">
                <h1 class="app-title">Network Session Asset</h1>
                <p class="app-subtitle">CEN RECHARGE PLAN</p>
            </div>

            <!-- LIVE USER WALLET BALANCING CONTEXT -->
            <div class="wallet-display">
                <span class="wallet-label">Available Balance</span>
                <span id="live-wallet-bal" class="wallet-value" style="color: #00ff88;">₹--.--</span>
            </div>
            
            <!-- PLAN TIME VALUE CONFIGURATION GRID -->
            <div class="time-config-grid">
                <div class="input-group">
                    <label>Duration</label>
                    <div class="input-wrapper">
                        <input type="number" id="custom-hrs" value="0" min="0" oninput="calculatePrice()">
                        <span class="input-unit">HR</span>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Fine Tune</label>
                    <div class="input-wrapper">
                        <input type="number" id="custom-mins" value="30" min="0" max="59" oninput="calculatePrice()">
                        <span class="input-unit">MIN</span>
                    </div>
                </div>
            </div>

            <!-- COMPUTED INVOICE COST SUMMARY -->
            <div class="price-display">
                <div>
                    <div class="price-meta-label">Plan Value Cost</div>
                    <div class="price-rate-hint">Rate: ₹200.00 / hr</div>
                </div>
                <div id="final-price">₹100.00</div>
            </div>
            
            <button class="btn-pay" onclick="processRecharge()">AUTHORIZE & UNLOCK</button>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://centrol-bank-default-rtdb.asia-southeast1.firebasedatabase.app" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = "pranshi_main";

    // Passive reference update for the real-time balance tracking UI component
    db.ref(`users/${userId}/balance`).on('value', (snap) => {
        const val = snap.val() || 0;
        document.getElementById('live-wallet-bal').innerText = `₹${parseFloat(val).toFixed(2)}`;
    });

    function calculatePrice() {
        const hrs = parseFloat(document.getElementById('custom-hrs').value) || 0;
        const mins = parseFloat(document.getElementById('custom-mins').value) || 0;
        const totalMins = (hrs * 60) + mins;
        const price = (totalMins / 60) * 200;
        document.getElementById('final-price').innerText = `₹${price.toFixed(2)}`;
        return { totalMins, price };
    }

    async function processRecharge() {
        const { totalMins, price } = calculatePrice();
        if (totalMins <= 0) return alert("Enter a valid time!");

        const userRef = db.ref(`users/${userId}`);
        try {
            const balSnap = await userRef.child('balance').once('value');
            let currentBal = balSnap.val() || 0;

            if (currentBal >= price) {
                await userRef.child('balance').set(currentBal - price);
                
                const now = Date.now();
                const newExpiry = now + (totalMins * 60 * 1000);
                
                await userRef.child('laptop_session').set({
                    expiry: newExpiry,
                    last_updated: now
                });

                await userRef.child('history').push({
                    amount: -price,
                    description: `SYSTEM RECHARGE: ${totalMins}m`,
                    timestamp: new Date().toLocaleString(),
                    type: "DEBIT"
                });

                alert("Signal Sent! Your laptop will unlock now.");
            } else {
                alert("Insufficient Funds in CEN Bank!");
                currentWin.setAlwaysOnTop(true, "screen-saver");
            }
        } catch (error) {
            console.error(error);
            alert("Database connection error!");
        }
    }
</script>
</body>
</html>
